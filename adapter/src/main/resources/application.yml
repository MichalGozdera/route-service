# Wspólne defaults: velomarker/velomarker-base.yml (z common-config)

spring:
  config:
    import:
      - classpath:velomarker/velomarker-base.yml
      - classpath:velomarker/velomarker-persistence.yml
  liquibase:
    enabled: true
    defaultSchema: routes
    change-log: classpath:db/changelog/changelog.sql
  jpa:
    hibernate:
      default_schema: routes
      ddl-auto: validate
    open-in-view: false
  datasource:
    hikari:
      connection-init-sql: SET search_path TO routes, public
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8083}

# BRouter — gdzie żyją pliki segmentów (bind mount kontenera) i jak do niego stukać po HTTP
brouter:
  segments-dir: ${BROUTER_SEGMENTS_DIR:./brouter-deploy/segments4}
  profiles-dir: ${BROUTER_PROFILES_DIR:./brouter-deploy/profiles2}
  control-api-url: ${BROUTER_CONTROL_API_URL:http://localhost:17779}
  routing-api-url: ${BROUTER_ROUTING_API_URL:http://localhost:17777}
  remote:
    base-url: ${BROUTER_REMOTE_BASE_URL:https://brouter.de/brouter/segments4/}

# Route planning — limity i konfiguracja
route:
  brouter:
    # embedded = JAR załadowany do route-service, method calls (zero HTTP) — DEFAULT (kontener
    # velomarker-brouter już nie istnieje). Współbieżność ograniczona semaforem poniżej. Segments .rd5
    # mmap-owane przez OS page cache; przy aktywnym planie zdekodowane kafle są współdzielone (shared-rd5-store).
    # http = legacy HTTP do kontenera velomarker-brouter (już nieużywane; zostaje tylko jako awaryjny fallback).
    # Sterowane zmienną ENV — restart route-service przepina implementację (ConditionalOnProperty).
    mode: ${ROUTE_BROUTER_MODE:embedded}
    # Maks. równocześnie wykonywanych routing calls. BRouter container miał 10 workerów × 1g heap;
    # embedded dzieli jeden heap JVM, więc 16 jest bezpieczne na start. Monitoring saturacji semafora
    # w Grafanie zdecyduje czy podnosić/obniżać.
    max-concurrent: ${ROUTE_BROUTER_MAX_CONCURRENT:16}
    # RoutingContext.memoryclass (MB) na pojedynczy routing call — limit pamięci microcache per-trasa.
    # Domyślny BRouter to 64 MB; przy szerokim szukaniu A* (ultra-gminy ekspanduje dużo węzłów) 64 MB
    # wpada w panic-mode eviction → re-dekodowanie microcache W TRAKCIE jednego callu → calc p50 rośnie.
    # 256 MB usuwa thrash. UWAGA: pamięć ~ memory-class-mb × równoczesne calls (≤ max-concurrent).
    memory-class-mb: ${ROUTE_BROUTER_MEMORY_CLASS:256}
    # Twardy limit (ms) na pojedynczy PRÓBNY call planowania (computeStats=false). Patologiczne trasy
    # (target-island, las/woda) liczą się 10-22 s i przez batch-barrier (f.get() na całym batchu) dławią
    # równoległość — rdzenie czekają na jeden zawieszony call. Po timeoucie → haversine fallback (planer
    # traktuje jak wyspę). Finalny routing (computeStats=true) ZAWSZE bez limitu. 0 = wyłącz limit.
    # DEFAULT 0 = WYŁĄCZONE (ryzyko ucięcia osiągalnych-ale-wolnych gmin jako wysp; po L2 ogon mniej boli).
    # >0 włącza limit (np. 6000) — wtedy patologiczna trasa pada → haversine fallback.
    probe-timeout-ms: ${ROUTE_BROUTER_PROBE_TIMEOUT_MS:0}
  calculate:
    # Match z BROUTER_WORKERS w brouter container (Iter 12: 10 = rdzenie hosta; też = brouterParallelism
    # plannera Coverage/3 dla równoległego pre-warm krawędzi). ≤ BROUTER_WORKERS by uniknąć 429.
    max-concurrent: ${ROUTE_CALCULATE_MAX_CONCURRENT:10}
    # Czas oczekiwania na slot zanim 429
    semaphore-wait-seconds: ${ROUTE_CALCULATE_WAIT_SECONDS:5}
    # Timeout pojedynczego wywołania brouter. 180s: alpejskie chunki (ciężki teren) potrafią
    # przekroczyć 60s; chunked-routing i tak tnie na mniejsze przy timeoutcie (calculateChunkResilient).
    brouter-timeout-seconds: ${ROUTE_CALCULATE_BROUTER_TIMEOUT:180}
  elevation:
    # Wysokość czytana LOKALNIE z plików SRTM HGT (bez OTD/HTTP — koniec 502 pod obciążeniem).
    # Katalog z kaflami .hgt (N50E014.hgt), 3″ po konwersji z Copernicusa. route-service mmap-uje je (LRU + page-cache).
    hgt-dir: ${ELEVATION_HGT_DIR:./infra/elevation/data/hgt3}
    # Ile kafli .hgt trzymać otwartych (mmap) jednocześnie (LRU). OFF-heap, OS page-cache trzyma gorące strony.
    hgt-open-tiles: ${ELEVATION_HGT_OPEN_TILES:192}
    # Liczba próbek elevation dla CAŁEGO śladu (jedno przejście zamiast per-segment). == frontend MAX_SAMPLES.
    max-samples: ${ELEVATION_MAX_SAMPLES:500}
    # Bufor pobrania .tif (Copernicus). route-service tylko TU zrzuca .tif — konwersją na .hgt zajmuje się osobny
    # kontener dem-converter (gdal), który pisze do hgt-dir i kasuje .tif. route-service gdala NIE używa.
    tiles-dir: ${ELEVATION_TILES_DIR:./infra/elevation/data/copernicus30m}
    # AWS Open Data Copernicus DEM GLO-30 bucket — public read, no auth (źródło .tif do konwersji na .hgt).
    tile-source-url: ${COPERNICUS_DEM_BASE_URL:https://copernicus-dem-30m.s3.amazonaws.com}

jwt:
  secret-key: ${JWT_SECRET_KEY:CHANGEME_32_chars_minimum_for_HS256_algo_xxxxxx}

# Planning (asystent tras) — adres visit-service + algorytm doboru obszarów COVERAGE intent.
planning:
  visit-service:
    base-url: ${PLANNING_VISIT_SERVICE_URL:http://localhost:8082}
  coverage:
    # Effort model: 1 m wzniosu = ALPHA km. Profile-independent. effort = km + alpha·climb.
    alpha-km-per-meter: ${PLANNING_COVERAGE_ALPHA:0.1}
    # ADMIN DEBUG: loguj GeoJSON snapshot trasy na każdej fazie seeda (init/batch/prune/densify/reconcile/final)
    # do podglądu w mapie rysowania (panel 🐞 paste-to-map). UWAGA: per-batch zalewa log → włączaj tylko do debugowania.
    debug-geojson: ${ROUTE_PLANNING_DEBUG_GEOJSON:true}

springdoc:
  swagger-ui:
    urls[0]:
      url: /v3/api-docs
      name: routes

---
spring:
  application:
    name: ${SERVICE_NAME:route-service}
  config:
    activate:
      on-profile: default
  lifecycle:
    timeout-per-shutdown-phase: 5s

server:
  port: 8085
  shutdown: graceful
